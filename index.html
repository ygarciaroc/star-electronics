<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Electronics | Technical Solutions</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ececec;
            --accent: #0070f3;
            --secondary: #888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 10%;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        section {
            padding: 100px 10% 60px;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            padding: 150px 10% 100px;
        }

        h1 { font-size: 3.5rem; margin-bottom: 10px; }
        p.subtitle { color: var(--secondary); font-size: 1.2rem; margin-bottom: 30px; }

        .btn {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: var(--accent);
        }

        .contact-links {
            list-style: none;
            padding: 0;
        }

        .contact-links li {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--secondary);
            font-size: 0.8rem;
            border-top: 1px solid #222;
        }

        /* Form styling for Quote */
        form {
            display: grid;
            gap: 15px;
            max-width: 500px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">⭐ STAR ELECTRONICS</div>
        <div>
            <a href="#home">Home</a>
            <a href="#services">Services</a>
            <a href="#quote">Get a Quote</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="home" class="hero">
        <h1>One Identity. <br>Limitless Technical Solutions.</h1>
        <p class="subtitle">From hardware engineering to digital infrastructure. We build the future.</p>
        <a href="#quote" class="btn">Start Your Project</a>
    </section>

    <section id="services">
        <h2>Services</h2>
        <div class="services-grid">
            <div class="card">
                <h3>Hardware Design</h3>
                <p>Custom PCB layouts, prototyping, and electronic repair services.</p>
